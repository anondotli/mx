[main]
lookup_timeout = 10

[defer]
helo_temperror = true
mfrom_temperror = true

[deny]
; Be careful with SPF failures due to forwarding
; Use soft-fail approach since we're a forwarding service
mfrom_fail = false
mfrom_softfail = false

[skip]
; Skip SPF checks for relaying (outbound)
relaying = true
