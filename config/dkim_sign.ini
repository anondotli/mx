[main]
disabled = false
headers_to_sign = From, To, Subject, Date, Message-ID, Content-Type, MIME-Version

; DKIM keys are looked up per-domain
; For anon.li and reply.anon.li, keys are in config/dkim/<domain>/private
; For custom domains, keys are fetched from the API

[domain anon.li]
selector = default
private_key = /etc/haraka/config/dkim/anon.li/private

[domain reply.anon.li]
selector = default
private_key = /etc/haraka/config/dkim/reply.anon.li/private
