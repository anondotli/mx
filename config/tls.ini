[main]
# Force TLS for security while keeping Node/OpenSSL's modern default cipher
# selection. A narrow hard-coded RSA-only list caused interoperability issues
# with legitimate senders.
minVersion = TLSv1.2
requestCert = false
rejectUnauthorized = false
key = tls/anon.li.pem
cert = tls/anon.li.pem
