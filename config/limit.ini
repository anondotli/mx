[main]
max_connections = 10
max_recipients = 50
max_errors = 5
max_unrecognized_commands = 10

# Rate limiting settings (used by limit-upstash.js)
# 20 emails per 60 seconds per IP
rate_limit_window = 60
rate_limit_count = 20

# Per-alias rate limiting (used by rcpt_to.anonli.js)
# 50 emails per 300 seconds per alias
alias_rate_limit_window = 300
alias_rate_limit_count = 50
